<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bedrock Go</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#1a0033">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bedrock Go">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0a0012;
    --panel:#150324;
    --panel2:#1c0630;
    --panel3:#26073f;
    --card: rgba(38,10,64,0.65);
    --card-border: rgba(160,90,230,0.25);
    --accent:#9d4edd;
    --accent2:#c77dff;
    --accent3:#e0aaff;
    --text:#f3e6ff;
    --muted:#a988c9;
    --muted2:#7d5a9e;
    --danger:#ff6b81;
    --good:#8de3b0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse at 15% 0%, rgba(157,78,221,0.18), transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(90,24,154,0.22), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  h1,h2,h3,.brand,.big-num{ font-family:'Baloo 2', sans-serif; }
  button{ font-family:inherit; }
  ::-webkit-scrollbar{ width:0; height:0; }

  #app-shell{
    max-width:480px; margin:0 auto; height:100dvh;
    display:flex; flex-direction:column; position:relative;
    background:linear-gradient(180deg, #0d0018 0%, #0a0012 100%);
  }
  #screen{
    flex:1; overflow-y:auto; padding:14px 14px 90px 14px;
    -webkit-overflow-scrolling:touch;
  }

  /* ---------- shared bits ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .curpills{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    display:flex; align-items:center; gap:6px;
    background:var(--panel2); border:1px solid var(--card-border);
    padding:6px 12px 6px 8px; border-radius:999px; font-size:13px; font-weight:600;
    color:var(--text);
  }
  .pill .plus{
    width:18px; height:18px; border-radius:50%; background:var(--accent);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;
    margin-left:2px; border:none; cursor:pointer;
  }
  .icon-btn{ background:var(--panel2); border:1px solid var(--card-border); border-radius:12px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; color:var(--text); cursor:pointer; }
  .icon-btn svg{ width:18px; height:18px; }
  .cube-ico{ width:14px; height:14px; background:linear-gradient(135deg,#e0aaff,#7b2cbf); border-radius:3px; transform:rotate(8deg); box-shadow:0 0 6px rgba(180,100,255,0.6); }
  .tag-ico{ width:14px; height:10px; background:linear-gradient(135deg,#ff9ad2,#c77dff); border-radius:3px 3px 3px 0; }

  .card{
    background:var(--card); border:1px solid var(--card-border); border-radius:18px;
    padding:16px; margin-bottom:14px; backdrop-filter:blur(6px);
  }
  .card h3{ margin:0 0 8px 0; font-size:16px; }
  .muted{ color:var(--muted); font-size:13px; line-height:1.6; }

  .btn{
    border:none; border-radius:12px; padding:10px 16px; font-weight:700; font-size:14px;
    cursor:pointer; color:var(--text); background:var(--panel2); border:1px solid var(--card-border);
  }
  .btn-primary{ background:linear-gradient(135deg,var(--accent),#7b2cbf); color:#fff; box-shadow:0 4px 16px rgba(157,78,221,0.35); }
  .btn-ghost{ background:transparent; border:1px solid var(--card-border); }
  .btn-danger{ background:rgba(255,107,129,0.15); border:1px solid rgba(255,107,129,0.4); color:#ffb3c0; }
  .btn-block{ width:100%; }
  .btn-row{ display:flex; gap:8px; margin-top:10px; }
  .btn:active{ transform:scale(0.97); }

  .section-title{ font-size:19px; font-weight:800; margin:4px 0 12px 2px; font-family:'Baloo 2', sans-serif; }

  .toptabs{ display:flex; gap:6px; margin-bottom:14px; background:var(--panel2); padding:5px; border-radius:14px; overflow-x:auto; }
  .toptabs button{
    flex:1; padding:9px 8px; border:none; background:transparent; color:var(--muted); font-weight:700;
    border-radius:10px; font-size:13px; cursor:pointer; white-space:nowrap;
  }
  .toptabs button.active{ background:var(--accent); color:#fff; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .grid4{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }

  .list-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 4px; border-bottom:1px solid rgba(160,90,230,0.12);
  }
  .list-item:last-child{ border-bottom:none; }
  .list-left{ display:flex; align-items:center; gap:12px; }
  .icon-badge{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:var(--panel2); font-size:17px; flex-shrink:0;
  }
  .chev{ color:var(--muted2); font-size:18px; }

  .badge-vip{
    font-size:10px; font-weight:800; color:#2a0845; background:linear-gradient(135deg,#f6e3ff,#c77dff);
    padding:2px 7px; border-radius:6px; letter-spacing:0.5px; margin-left:6px;
  }
  .badge-clan{
    font-size:10px; font-weight:800; color:#2a0845; background:linear-gradient(135deg,#8de3b0,#4fb87e);
    padding:2px 7px; border-radius:6px; letter-spacing:0.5px;
  }
  .badge-hot{ font-size:9px; font-weight:800; color:#fff; background:linear-gradient(135deg,#ff9a5a,#e0533d); padding:2px 6px; border-radius:6px; }

  .progress-track{ height:9px; border-radius:6px; background:rgba(160,90,230,0.15); overflow:hidden; margin:8px 0 4px; }
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); border-radius:6px; transition:width .3s; }

  /* ---------- avatar ---------- */
  .avatar-stage{
    height:220px; border-radius:20px; margin-bottom:10px; position:relative; overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%, rgba(157,78,221,0.35), transparent 65%), var(--panel2);
    border:1px solid var(--card-border);
    display:flex; align-items:center; justify-content:center; transition:height .25s;
  }
  .avatar-stage.expanded{ height:320px; }
  .stage-side-icons{ position:absolute; right:10px; top:10px; display:flex; flex-direction:column; gap:8px; }
  .stage-side-icons .icon-btn{ width:32px; height:32px; background:rgba(15,3,26,0.6); }
  .avatar-circle{
    width:120px; height:120px; border-radius:26px; overflow:hidden;
    display:flex; align-items:center; justify-content:center; font-size:44px; font-weight:800;
    box-shadow:0 8px 30px rgba(157,78,221,0.4); border:3px solid rgba(224,170,255,0.5);
    transition:transform .5s;
  }
  .avatar-circle.spin{ transform:rotateY(360deg); }
  .avatar-circle img{ width:100%; height:100%; object-fit:cover; }
  .avatar-mini{ width:52px; height:52px; border-radius:14px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; }
  .avatar-mini img{ width:100%; height:100%; object-fit:cover; }
  .avatar-sm{ width:38px; height:38px; border-radius:11px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; }
  .avatar-sm img{ width:100%; height:100%; object-fit:cover; }

  .avatar-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .segchip{ display:flex; background:var(--panel2); border:1px solid var(--card-border); border-radius:999px; padding:3px; }
  .segchip button{ border:none; background:transparent; color:var(--muted); font-size:12.5px; font-weight:700; padding:6px 14px; border-radius:999px; cursor:pointer; }
  .segchip button.active{ background:var(--accent); color:#fff; }
  .cart-chip{ display:flex; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--card-border); border-radius:999px; padding:7px 12px; font-size:12.5px; font-weight:700; color:var(--muted); }

  .shop-card{ border-radius:14px; overflow:hidden; background:var(--panel2); border:1px solid var(--card-border); position:relative; }
  .shop-thumb{ height:82px; display:flex; align-items:center; justify-content:center; font-size:34px; position:relative; }
  .shop-owned-tag{ position:absolute; top:6px; right:6px; background:rgba(141,227,176,0.85); color:#0a2416; font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px; }
  .shop-eq-tag{ position:absolute; top:6px; right:6px; background:var(--accent3); color:#2a0845; font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px; }
  .shop-hot-tag{ position:absolute; top:6px; left:6px; }
  .shop-info{ padding:8px 9px 10px; }
  .shop-price{ display:flex; align-items:center; gap:4px; font-size:12px; font-weight:700; margin-top:4px; }
  .shop-name{ font-size:12px; font-weight:600; color:var(--text); line-height:1.3; height:31px; overflow:hidden; }
  .shop-btn{ width:100%; margin-top:7px; padding:6px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; }

  .skin-tile{ position:relative; border-radius:14px; overflow:hidden; background:var(--panel2); border:1px solid var(--card-border); aspect-ratio:1; display:flex; align-items:center; justify-content:center; }
  .skin-tile img{ width:100%; height:100%; object-fit:cover; }
  .skin-del{ position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:rgba(10,0,20,0.7); color:#fff; border:none; font-size:11px; }
  .skin-eq{ position:absolute; bottom:0; left:0; right:0; background:var(--accent); color:#fff; font-size:10px; font-weight:800; text-align:center; padding:3px 0; }
  .upload-tile{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:var(--muted); font-size:11px; font-weight:700; cursor:pointer; border:2px dashed var(--card-border); }

  /* ---------- promo / quests (home) ---------- */
  .promo-row{ display:flex; gap:10px; overflow-x:auto; margin-bottom:14px; padding-bottom:2px; }
  .promo-card{ flex:0 0 148px; height:80px; border-radius:16px; padding:12px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; border:1px solid var(--card-border); }
  .promo-card .pt{ font-size:12.5px; font-weight:800; }
  .promo-card .ps{ font-size:10.5px; opacity:0.8; }
  .quest-strip{ display:flex; gap:10px; overflow-x:auto; margin-bottom:18px; }
  .quest-chip{ flex:0 0 auto; display:flex; align-items:center; gap:6px; background:var(--panel2); border:1px solid var(--card-border); padding:8px 13px; border-radius:999px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; }

  /* ---------- chat ---------- */
  .chat-row{ display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid rgba(160,90,230,0.12); cursor:pointer; }
  .chat-row:last-child{ border-bottom:none; }
  .chat-meta{ flex:1; min-width:0; }
  .chat-name{ font-weight:700; font-size:14.5px; }
  .chat-last{ font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .thread-wrap{ display:flex; flex-direction:column; height:100%; }
  .thread-head{ display:flex; align-items:center; gap:10px; padding-bottom:12px; border-bottom:1px solid var(--card-border); margin-bottom:10px; }
  .thread-msgs{ flex:1; display:flex; flex-direction:column; gap:8px; padding:6px 0 12px; }
  .bubble{ max-width:75%; padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.4; }
  .bubble.me{ align-self:flex-end; background:linear-gradient(135deg,var(--accent),#7b2cbf); color:#fff; border-bottom-right-radius:4px; }
  .bubble.them{ align-self:flex-start; background:var(--panel2); border:1px solid var(--card-border); border-bottom-left-radius:4px; }
  .bubble-time{ font-size:10px; opacity:0.65; margin-top:3px; display:block; }
  .thread-input{ display:flex; gap:8px; align-items:center; position:sticky; bottom:0; background:var(--bg); padding-top:8px; }
  .thread-input input{ flex:1; background:var(--panel2); border:1px solid var(--card-border); border-radius:999px; padding:11px 16px; color:var(--text); font-size:14px; }
  .thread-input input:focus{ outline:none; border-color:var(--accent); }
  .send-btn{ width:42px; height:42px; border-radius:50%; background:var(--accent); border:none; color:#fff; font-size:16px; flex-shrink:0; }

  input, textarea, select{ font-family:inherit; }
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .field input[type=text], .field input[type=number]{
    width:100%; background:var(--panel2); border:1px solid var(--card-border); border-radius:10px;
    padding:10px 12px; color:var(--text); font-size:14px;
  }
  .field input:focus{ outline:none; border-color:var(--accent); }
  .field input[type=range]{ width:100%; accent-color:var(--accent); }
  .switch-row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
  .switch{ position:relative; width:44px; height:25px; background:var(--panel2); border-radius:999px; border:1px solid var(--card-border); cursor:pointer; }
  .switch.on{ background:var(--accent); }
  .switch .knob{ position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%; background:#fff; transition:.2s; }
  .switch.on .knob{ left:21px; }
  .crest-opt{ font-size:20px !important; padding:10px !important; }
  .crest-opt.picked{ border-color:var(--accent3) !important; background:rgba(157,78,221,0.25) !important; }

  /* ---------- modal ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(6,0,14,0.72); backdrop-filter:blur(3px); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
  .modal{
    width:100%; max-width:480px; background:var(--panel); border:1px solid var(--card-border);
    border-radius:22px 22px 0 0; padding:20px; max-height:85vh; overflow-y:auto;
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{ from{ transform:translateY(30px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .modal-head h3{ margin:0; font-size:17px; }
  .modal-close{ background:var(--panel2); border:none; color:var(--text); width:30px; height:30px; border-radius:50%; font-size:15px; }
  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%); z-index:70;
    background:var(--panel2); border:1px solid var(--accent3); color:var(--text);
    padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600;
    box-shadow:0 6px 24px rgba(0,0,0,0.4); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
    max-width:85%; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  /* ---------- bottom nav ---------- */
  #tabbar{
    position:absolute; bottom:0; left:0; right:0; height:66px;
    background:rgba(15,3,26,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--card-border);
    display:flex; align-items:stretch; z-index:30;
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    background:none; border:none; color:var(--muted2); font-size:10.5px; font-weight:700; cursor:pointer;
  }
  .tab-btn svg{ width:23px; height:23px; }
  .tab-btn.active{ color:var(--accent3); }
  .tab-btn.active svg{ filter:drop-shadow(0 0 6px rgba(199,125,255,0.7)); }

  .empty-state{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:var(--muted); text-align:center; gap:10px; }
  .empty-emoji{ font-size:44px; }

  .hero-banner{
    border-radius:20px; padding:20px; margin-bottom:14px; position:relative; overflow:hidden;
    background:linear-gradient(120deg, #3b0764, #7b2cbf 60%, #c77dff 130%);
  }
  .hero-banner h2{ margin:0 0 4px; font-size:21px; }
  .hero-banner p{ margin:0; font-size:13px; color:rgba(255,255,255,0.85); }

  .clan-banner{ border-radius:20px; padding:22px; margin-bottom:14px; text-align:center;
    background:radial-gradient(ellipse at 50% 0%, rgba(157,78,221,0.4), transparent 70%), var(--panel2);
    border:1px solid var(--card-border); }
  .clan-crest{ font-size:46px; margin-bottom:6px; }

  /* ---------- account preview ---------- */
  .preview-bg{
    height:130px; position:relative;
    background:
      radial-gradient(circle at 30% 20%, rgba(224,170,255,0.35), transparent 55%),
      linear-gradient(135deg,#7b2cbf,#3b0764 60%,#c77dff 130%);
  }
  .preview-dress{
    position:absolute; bottom:-42px; left:50%; transform:translateX(-50%);
    width:100px; height:100px; border-radius:24px; overflow:hidden;
    border:3px solid rgba(224,170,255,0.6); box-shadow:0 10px 26px rgba(0,0,0,0.45);
    font-size:40px; display:flex; align-items:center; justify-content:center; z-index:2;
  }
  .preview-body{ padding:56px 22px 22px; text-align:center; }
  .preview-pic-wrap{ position:relative; width:52px; margin:0 auto 10px; }
  .preview-pic{
    width:52px; height:52px; border-radius:15px; overflow:hidden;
    border:2px solid rgba(224,170,255,0.55); display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .preview-pic-cam{
    position:absolute; bottom:-4px; right:-6px; width:22px; height:22px; border-radius:50%;
    background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px;
    border:2px solid var(--panel); cursor:pointer;
  }
  .preview-name{ font-weight:800; font-size:18px; }
  .preview-id{ color:var(--muted); font-size:12.5px; margin-top:3px; }
  .preview-intro{
    margin-top:16px; padding:13px; background:var(--panel2); border:1px solid var(--card-border);
    border-radius:12px; font-size:13px; color:var(--text); line-height:1.5; text-align:left;
  }

  /* ---------- login / register ---------- */
  .link-register{
    color:var(--accent3); text-decoration:underline; text-decoration-color:var(--accent);
    text-underline-offset:4px; cursor:pointer; font-weight:700; font-size:13.5px;
  }
  #authGate{
    position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(157,78,221,0.25), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(90,24,154,0.3), transparent 55%),
      var(--bg);
    padding:24px;
  }
  #authGate .authCard{ width:100%; max-width:400px; }
  #authGate h1{ font-size:30px; text-align:center; margin-bottom:4px; background:linear-gradient(180deg,#f3e6ff,#c77dff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #authGate .sub{ text-align:center; color:var(--muted); font-size:13px; margin-bottom:26px; letter-spacing:0.5px; }
  #app-shell{ display:none; }
  #app-shell.visible{ display:flex; }
</style>
</head>
<body>
<div id="authGate">
  <div class="authCard" id="authCardInner"></div>
</div>

<div id="app-shell">
  <div id="screen"></div>
  <div id="tabbar"></div>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ICONS
============================================================ */
const ICONS = {
  home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>`,
  clan: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4"/><path d="M4 4h13l-2.5 4L17 12H4"/></svg>`,
  shirt: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4 4 7l2 3 2-1v11h8V9l2 1 2-3-4-3-2 2-2-2Z"/></svg>`,
  chat: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>`,

/* ============================================================
   API LAYER
============================================================ */
const API = ''; // same-origin
let activeToken = localStorage.getItem('bgActiveToken') || null;

function getSavedSessions(){
  try{ return JSON.parse(localStorage.getItem('bgSessions')||'[]'); }catch(e){ return []; }
}
function setSavedSessions(list){ localStorage.setItem('bgSessions', JSON.stringify(list)); }
function rememberSession(token, user){
  const list = getSavedSessions().filter(s=>s.id!==user.id);
  list.unshift({ token, id:user.id, username:user.username });
  setSavedSessions(list);
}
function forgetSession(id){ setSavedSessions(getSavedSessions().filter(s=>s.id!==id)); }
function setActiveToken(token){
  activeToken = token;
  if(token) localStorage.setItem('bgActiveToken', token);
  else localStorage.removeItem('bgActiveToken');
}

async function api(method, path, body){
  try{
    const res = await fetch(API + path, {
      method,
      headers: Object.assign({ 'Content-Type':'application/json' }, activeToken ? { 'Authorization':'Bearer '+activeToken } : {}),
      body: body !== undefined ? JSON.stringify(body) : undefined
    });
    let data = {};
    try{ data = await res.json(); }catch(e){ /* no body */ }
    if(!res.ok){ return { ok:false, status:res.status, error: data.error || ('Request failed ('+res.status+')') }; }
    return { ok:true, status:res.status, data };
  }catch(e){
    return { ok:false, status:0, error:'Could not reach the server. Check your connection.' };
  }
}

async function boot(){
  const shopRes = await api('GET','/api/shop');
  if(shopRes.ok) SHOP_ITEMS = shopRes.data.items;

  if(activeToken){
    const ok = await refreshState();
    if(ok){ showApp(); return; }
  }
  showAuthGate('login');
}

async function refreshState(){
  const meRes = await api('GET','/api/me');
  if(!meRes.ok){ setActiveToken(null); return false; }
  state = { profile: meRes.data.user, clan:null, friendsList:[] };
  const [clanRes, friendsRes] = await Promise.all([ api('GET','/api/clan'), api('GET','/api/friends') ]);
  if(clanRes.ok) state.clan = clanRes.data.clan;
  if(friendsRes.ok) state.friendsList = friendsRes.data.friends;
  return true;
}

function showApp(){
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app-shell').classList.add('visible');
  render();
}
function showAuthGate(view, payload){
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('authGate').style.display = 'flex';
  ui.authView = view;
  modalPayload = payload || null;
  renderAuthGate();
}

function renderAuthGate(){
  const root = document.getElementById('authCardInner');
  if(ui.authView === 'login'){
    root.innerHTML = `
      <h1>Bedrock Go</h1>
      <div class="sub">SIGN IN TO PLAY WITH EVERYONE</div>
      <div class="card">
        <div class="field"><label>ID / Username</label><input type="text" id="gateLoginId" placeholder="Enter your ID or Username"></div>

        <div style="text-align:center; margin-top:18px;">
          <span class="link-register" id="gateOpenRegisterBtn">Register account</span>
        </div>
      </div>`;
    document.getElementById('gateLoginBtn').onclick = doGateLogin;
    document.getElementById('gateOpenRegisterBtn').onclick = ()=> showAuthGate('registerStep1');
  } else if(ui.authView === 'registerStep1'){
    root.innerHTML = `
      <h1>Bedrock Go</h1>
      <div class="sub">STEP 1 OF 2 — CHOOSE A USERNAME</div>
      <div class="card">
        <div class="field"><label>Username</label><input type="text" id="gateRegUsername" placeholder="e.g. Nightbloom" value="${ui.regUsername||''}"></div>
        <button class="btn btn-primary btn-block" id="gateRegNextBtn">Next</button>
        <div style="text-align:center; margin-top:18px;">
          <span class="link-register" id="gateBackToLoginBtn">Back to login</span>
        </div>
      </div>`;
    document.getElementById('gateRegNextBtn').onclick = ()=>{
      const uname = document.getElementById('gateRegUsername').value.trim();
      if(!uname || uname.length<3){ showToast('Username must be at least 3 characters'); return; }
      ui.regUsername = uname;
      showAuthGate('registerStep2');
    };
    document.getElementById('gateBackToLoginBtn').onclick = ()=> showAuthGate('login');
  } else if(ui.authView === 'registerStep2'){
    root.innerHTML = `
      <h1>Bedrock Go</h1>
      <div class="sub">STEP 2 OF 2 — SET A PASSWORD</div>
      <div class="card">
        <p class="muted">Creating <b style="color:var(--text);">${ui.regUsername}</b> — your account ID will be randomly generated.</p>
        <div class="field"><label>Password</label><input type="password" id="gateRegPassword" placeholder="Create a password"></div>
        <div class="field"><label>Confirm Password</label><input type="password" id="gateRegPasswordConfirm" placeholder="Re-enter password"></div>
        <button class="btn btn-primary btn-block" id="gateRegCreateBtn">Create Account</button>
      </div>`;
    document.getElementById('gateRegCreateBtn').onclick = doGateRegister;
  }
}

async function doGateLogin(){
  const idOrUsername = document.getElementById('gateLoginId').value.trim();
  const password = document.getElementById('gateLoginPassword').value;
  if(!idOrUsername){ showToast('Enter your ID or Username'); return; }
  const res = await api('POST','/api/login', { idOrUsername, password });
  if(!res.ok){ showToast(res.error); return; }
  setActiveToken(res.data.token);
  rememberSession(res.data.token, res.data.user);
  const ok = await refreshState();
  if(ok){ showToast(`Welcome back, ${state.profile.username}!`); showApp(); }
}
async function doGateRegister(){
  const pw = document.getElementById('gateRegPassword').value;
  const pw2 = document.getElementById('gateRegPasswordConfirm').value;
  if(!pw || pw.length<4){ showToast('Password must be at least 4 characters'); return; }
  if(pw !== pw2){ showToast('Passwords do not match'); return; }
  const res = await api('POST','/api/register', { username: ui.regUsername, password: pw });
  if(!res.ok){
    showToast(res.error);
    if(res.status===409) showAuthGate('registerStep1'); // username taken — let them pick another
    return;
  }
  setActiveToken(res.data.token);
  rememberSession(res.data.token, res.data.user);
  const ok = await refreshState();
  if(ok){ showToast(`Account "${state.profile.username}" created — ID ${state.profile.id}`); showApp(); }
}

  const skin = (userMini.skins||[]).find(s=>s.id===userMini.equippedSkinId);

}

function viewChat(){
  if(ui.activeThread){ return viewThread(ui.activeThread); }
  const sub = ui.chatSub;
  let body='';
  if(sub==='chat'){
    const rows = [
      {id:'announce', name:'Wonderful Activities', icon:'🚩'},
      ...state.friendsList.map(f=>({id:f.id, name:f.username, icon:null, mini:f}))
    ];
    body = `<div class="card" style="padding:0 12px;">
      ${rows.map(r=>`
        <div class="chat-row" data-open-thread="${r.id}">
          <div class="icon-badge" style="font-size:19px; overflow:hidden;">${r.icon || miniAvatarInner(r.mini)}</div>
          <div class="chat-meta"><div class="chat-name">${r.name}</div><div class="chat-last">Tap to open chat</div></div>
        </div>
      `).join('')}
    </div>`;
  } else if(sub==='friends'){
    body = `
      <button class="btn btn-primary btn-block" id="addFriendBtn" style="margin-bottom:12px;">+ Add Friend</button>
      <div class="card">
        ${state.friendsList.map(f=>`
          <div class="list-item">
            <div class="list-left">
              <div class="icon-badge" style="overflow:hidden;">${miniAvatarInner(f)}</div>
              <div><b>${f.username}</b><br><span class="muted">ID ${f.id}</span></div>
            </div>
            <div class="btn-row" style="margin:0;">
              <button class="btn btn-ghost" data-open-thread="${f.id}" style="padding:6px 10px; font-size:12px;">Message</button>
              <button class="btn btn-danger" data-remove-friend="${f.id}" style="padding:6px 10px; font-size:12px;">Remove</button>
            </div>
          </div>
        `).join('') || '<p class="muted">No friends yet — add a real player by their ID or username.</p>'}
      </div>`;
  } else if(sub==='clangroup'){
    if(!state.clan){ body = `<div class="empty-state"><div class="empty-emoji">🚩</div><p class="muted">Join a clan first to unlock the clan chat.</p></div>`; }
    else { ui.activeThread = 'clan'; return viewThread('clan'); }
  }
  return `
  <div class="topbar"><div style="font-weight:800; font-size:19px;">Chat</div>${currencyBar()}</div>
  <div class="toptabs">
    <button data-chatsub="chat" class="${sub==='chat'?'active':''}">Chat</button>
    <button data-chatsub="friends" class="${sub==='friends'?'active':''}">Friends</button>
    <button data-chatsub="clangroup" class="${sub==='clangroup'?'active':''}">Clan</button>
  </div>
  ${body}`;
}
function viewThread(id){
  const isAnnounce = id==='announce';
  const isClan = id==='clan';
  const friend = state.friendsList.find(f=>f.id===id);
  const title = isAnnounce ? 'Wonderful Activities' : isClan ? (state.clan.name+' Clan Chat') : (friend ? friend.username : 'Chat');
  return `
  <div class="thread-wrap">
    <div class="thread-head">
      <button class="btn btn-ghost" id="backToChat" style="padding:7px 10px;">${ICONS.back}</button>
      <div class="icon-badge" style="overflow:hidden;">${isAnnounce?'🚩':isClan?'👑':miniAvatarInner(friend)}</div>
      <div style="font-weight:700;">${title}</div>
    </div>
    <div class="thread-msgs" id="threadMsgs"><p class="muted" style="text-align:center; margin-top:30px;">Loading…</p></div>
    ${!isAnnounce ? `
    <div class="thread-input">
      <input type="text" id="threadInput" placeholder="Message..." autocomplete="off">
      <button class="send-btn" id="threadSend">➤</button>
    </div>` : ''}
  </div>`;
}
function renderThreadMessages(messages){
  const el = document.getElementById('threadMsgs');
  if(!el) return;
  el.innerHTML = messages.length ? messages.map(m=>`
    <div class="bubble ${m.from===state.profile.id?'me':'them'}">${escapeHtml(m.text)}<span class="bubble-time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>
  `).join('') : '<p class="muted" style="text-align:center; margin-top:30px;">No chats info</p>';
  el.scrollTop = el.scrollHeight;
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function openThread(id){
  stopChatPolling();
  ui.activeThread = id;
  render();
  await pollThread();
  chatPollTimer = setInterval(pollThread, 3000);
}
function stopChatPolling(){ if(chatPollTimer){ clearInterval(chatPollTimer); chatPollTimer=null; } }
async function pollThread(){
  if(!ui.activeThread) return;
  const res = await api('GET', `/api/chat/${ui.activeThread}`);
  if(res.ok) renderThreadMessages(res.data.messages);
}

async function openModal(key, payload){
  modalPayload = payload || null;
  const root = document.getElementById('modalRoot');
  let html='';
  if(key==='topup') html = modalTopup();
  else if(key==='vip') html = modalVip();
  else if(key==='redeem') html = modalRedeem();
  else if(key==='admin'){
    if(state.profile.isDev){
      const res = await api('GET','/api/admin/status');
      if(res.ok) state.profile._devWhitelist = res.data.devWhitelist;
      html = modalAdmin();
    } else html = modalAdminGate();
  }
  else if(key==='editProfile') html = modalEditProfile();
  else if(key==='accounts') html = modalAccounts();
  else if(key==='createClan') html = modalCreateClan();
  else if(key==='browseClans') html = modalBrowseClans();
  else if(key==='addFriend') html = modalAddFriend();
  else if(key==='confirm') html = modalConfirm(payload);
  else if(key==='acctPreview') html = modalAcctPreview();
  else if(key==='myskins'){ ui.tab='avatar'; ui.avatarSub='myskins'; render(); return; }
  else if(['eventcenter','video','social','inbox','help','security','setting','battlepass','search'].includes(key)) html = modalStatic(key);
  else return;
  root.innerHTML = `<div class="overlay" id="overlayEl">${html}</div>`;
  document.getElementById('overlayEl').addEventListener('click', (e)=>{ if(e.target.id==='overlayEl') closeModal(); });
  bindModalEvents(key);
}

/* ============================================================
   EVENT BINDING — screen
============================================================ */
function bindScreenEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick = ()=>{ ui.tab = el.dataset.nav; render(); });
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick = ()=>{ if(el.dataset.open!=='none') openModal(el.dataset.open); });
  document.querySelectorAll('[data-quest]').forEach(el=>el.onclick = ()=> showToast('Event coming soon!'));

  const claim = document.getElementById('claimDaily');
  if(claim) claim.onclick = async ()=>{
    const res = await api('POST','/api/topup', { currency:'tickets', amount:20 });
    if(res.ok){ state.profile = res.data.user; showToast('+20 Tickets claimed!'); render(); }
    else showToast(res.error);
  };

  document.querySelectorAll('[data-sub]').forEach(el=>el.onclick=()=>{ ui.avatarSub = el.dataset.sub; render(); });
  document.querySelectorAll('[data-avatar-jump]').forEach(el=>el.onclick=()=>{ ui.avatarSub = el.dataset.avatarJump; render(); });

  document.querySelectorAll('[data-shop-action]').forEach(el=>el.onclick=async ()=>{
    const id = el.dataset.shopId, action = el.dataset.shopAction;
    const item = SHOP_ITEMS.find(i=>i.id===id);
    let res;
    if(action==='buy') res = await api('POST','/api/shop/buy', { itemId:id });
    else if(action==='equip') res = await api('PUT','/api/shop/equip', { itemId:id });
    else res = await api('PUT','/api/shop/equip', { itemId:id, unequip:true });
    if(res.ok){ state.profile = res.data.user; showToast(`${item.name} ${action==='buy'?'purchased & equipped':action+'ped'}!`); render(); }
    else showToast(res.error);
  });

  document.querySelectorAll('#screen .skin-tile[data-skin-id]').forEach(tile=>{
    tile.addEventListener('click', async (e)=>{
      if(e.target.closest('[data-del-skin]')) return;
      const res = await api('PUT','/api/skins/equip', { skinId: tile.dataset.skinId });
      if(res.ok){ state.profile = res.data.user; showToast('Skin equipped'); render(); } else showToast(res.error);
    });
  });
  document.querySelectorAll('[data-del-skin]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      const res = await api('DELETE', `/api/skins/${btn.dataset.delSkin}`);
      if(res.ok){ state.profile = res.data.user; render(); } else showToast(res.error);
    };
  });
  ['skinUpload','skinUploadTop'].forEach(elId=>{
    const el = document.getElementById(elId);
    if(!el) return;
    el.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = async ()=>{
        const res = await api('POST','/api/skins', { name:file.name, dataUrl:reader.result });
        if(res.ok){ state.profile = res.data.user; ui.avatarSub='myskins'; showToast('Skin uploaded & equipped!'); render(); }
        else showToast(res.error);
      };
      reader.readAsDataURL(file);
    };
  });

  const createClanBtn = document.getElementById('createClanBtn');
  if(createClanBtn) createClanBtn.onclick = ()=>{ ui.selectedCrest='🚩'; openModal('createClan'); };
  const browseClanBtn = document.getElementById('browseClanBtn');
  if(browseClanBtn) browseClanBtn.onclick = async ()=>{
    const res = await api('GET','/api/clans');
    if(res.ok) openModal('browseClans', res.data.clans); else showToast(res.error);
  };
  document.querySelectorAll('[data-clansub]').forEach(el=>el.onclick=()=>{ ui.clanSub = el.dataset.clansub; render(); });
  const contributeBtn = document.getElementById('contributeBtn');
  if(contributeBtn) contributeBtn.onclick = async ()=>{
    const res = await api('POST','/api/clan/contribute', {});
    if(res.ok){
      const acubesRes = await api('GET','/api/me');
      if(acubesRes.ok) state.profile = acubesRes.data.user;
      const clanRes = await api('GET','/api/clan');
      if(clanRes.ok) state.clan = clanRes.data.clan;
      showToast(res.data.leveledUp ? `Clan leveled up to ${res.data.clan.level}!` : 'Contributed 10 A-Cubes to the clan');
      render();
    } else showToast(res.error);
  };
  const leaveClanBtn = document.getElementById('leaveClanBtn');
  if(leaveClanBtn) leaveClanBtn.onclick = ()=> openModal('confirm', {title:'Leave Clan?', message:'You will lose your progress in this clan.', action:'leaveClan'});

  document.querySelectorAll('[data-chatsub]').forEach(el=>el.onclick=()=>{ ui.chatSub = el.dataset.chatsub; render(); });
  document.querySelectorAll('[data-open-thread]').forEach(el=>el.onclick=()=> openThread(el.dataset.openThread));
  const backBtn = document.getElementById('backToChat');
  if(backBtn) backBtn.onclick = ()=>{ stopChatPolling(); ui.activeThread = null; render(); };

  const threadSend = document.getElementById('threadSend');
  const threadInput = document.getElementById('threadInput');
  async function sendMsg(){
    const val = threadInput.value.trim();
    if(!val) return;
    threadInput.value = '';
    const res = await api('POST', `/api/chat/${ui.activeThread}`, { text: val });
    if(res.ok) await pollThread(); else showToast(res.error);
  }
  if(threadSend) threadSend.onclick = sendMsg;
  if(threadInput) threadInput.onkeydown = (e)=>{ if(e.key==='Enter') sendMsg(); };

  const addFriendBtn = document.getElementById('addFriendBtn');
  if(addFriendBtn) addFriendBtn.onclick = ()=> openModal('addFriend');
  document.querySelectorAll('[data-remove-friend]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.removeFriend;
    const f = state.friendsList.find(x=>x.id===id);
    openModal('confirm', {title:'Remove Friend?', message:`Remove ${f?f.username:'this friend'} from your friends list?`, action:'removeFriend', payload:id});
  });
}

/* ============================================================
   EVENT BINDING — modals
============================================================ */
function bindModalEvents(key){
  const closeBtn = document.getElementById('closeModalBtn');
  if(closeBtn) closeBtn.onclick = closeModal;

  document.querySelectorAll('[data-topup]').forEach(el=>el.onclick=async ()=>{
    const [cur, amt] = el.dataset.topup.split(':');
    const res = await api('POST','/api/topup', { currency:cur, amount:parseInt(amt) });
    if(res.ok){ state.profile = res.data.user; showToast(`+${amt} ${cur==='acubes'?'A-Cubes':'Tickets'}`); closeModal(); render(); } else showToast(res.error);
  });
  const vipUpgradeBtn = document.getElementById('vipUpgradeBtn');
  if(vipUpgradeBtn) vipUpgradeBtn.onclick = async ()=>{
    const res = await api('POST','/api/vip/upgrade', {});
    if(res.ok){ state.profile = res.data.user; showToast(`Upgraded to VIP ${state.profile.vip}!`); closeModal(); render(); } else showToast(res.error);
  };
  const redeemSubmit = document.getElementById('redeemSubmit');
  if(redeemSubmit) redeemSubmit.onclick = async ()=>{
    const code = document.getElementById('redeemInput').value.trim();
    if(!code) return;
    const res = await api('POST','/api/redeem', { code });
    if(res.ok){ state.profile = res.data.user; showToast('Code redeemed! +150 Tickets, +50 A-Cubes'); closeModal(); render(); } else showToast(res.error);
  };
  const editNameSave = document.getElementById('editNameSave');
  if(editNameSave) editNameSave.onclick = async ()=>{
    const username = document.getElementById('editName').value.trim();
    const intro = document.getElementById('editIntro').value.trim();
    const res = await api('PUT','/api/profile', { username, intro });
    if(res.ok){
      state.profile = res.data.user;
      const sessions = getSavedSessions().map(s=>s.id===state.profile.id ? {...s, username:state.profile.username} : s);
      setSavedSessions(sessions);
      closeModal(); render();
    } else showToast(res.error);
  };
  const previewEditBtn = document.getElementById('previewEditBtn');
  if(previewEditBtn) previewEditBtn.onclick = ()=> openModal('editProfile');
  const profilePicUpload = document.getElementById('profilePicUpload');
  if(profilePicUpload) profilePicUpload.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      const res = await api('PUT','/api/profile', { profilePic: reader.result });
      if(res.ok){ state.profile = res.data.user; showToast('Profile picture updated'); openModal('acctPreview'); } else showToast(res.error);
    };
    reader.readAsDataURL(file);
  };

  const nightToggle = document.getElementById('nightToggle');
  if(nightToggle) nightToggle.onclick = ()=>{
    ui.nightmode = !ui.nightmode;
    document.body.style.filter = ui.nightmode ? 'brightness(0.85) saturate(1.1)' : 'none';
    nightToggle.classList.toggle('on');
  };
  const openAccountsBtn = document.getElementById('openAccountsBtn');
  if(openAccountsBtn) openAccountsBtn.onclick = ()=> openModal('accounts');
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = ()=>{ setActiveToken(null); closeModal(); showAuthGate('login'); };

  document.querySelectorAll('[data-row-switch]').forEach(row=>row.onclick=async (e)=>{
    if(e.target.closest('[data-remove-session]')) return;
    const id = row.dataset.rowSwitch;
    if(id===state.profile.id) return;
    const session = getSavedSessions().find(s=>s.id===id);
    if(!session) return;
    setActiveToken(session.token);
    const ok = await refreshState();
    if(ok){ showToast('Account switched'); closeModal(); render(); }
    else showToast('That saved login has expired — please log in again');
  });
  document.querySelectorAll('[data-remove-session]').forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    forgetSession(el.dataset.removeSession);
    openModal('accounts');
  });
  const openLoginFromSettingsBtn = document.getElementById('openLoginFromSettingsBtn');
  if(openLoginFromSettingsBtn) openLoginFromSettingsBtn.onclick = ()=>{ closeModal(); showAuthGate('login'); };

  const adminVip = document.getElementById('adminVip');
  if(adminVip) adminVip.oninput = ()=>{ document.getElementById('vipLabel').textContent = adminVip.value; };
  const adminClan = document.getElementById('adminClan');
  if(adminClan) adminClan.oninput = ()=>{ document.getElementById('clanLabel').textContent = adminClan.value; };
  const infToggle = document.getElementById('infCubeToggle');
  if(infToggle) infToggle.onclick = ()=>{ infToggle.classList.toggle('on'); };
  const adminSave = document.getElementById('adminSave');
  if(adminSave) adminSave.onclick = async ()=>{
    const res = await api('PUT','/api/admin/user', {
      vip: parseInt(document.getElementById('adminVip').value),
      tickets: parseInt(document.getElementById('adminTickets').value)||0,
      acubes: parseInt(document.getElementById('adminCubes').value)||0,
      infiniteCubes: document.getElementById('infCubeToggle').classList.contains('on'),
      clanLevel: state.clan ? parseInt(document.getElementById('adminClan').value) : undefined
    });
    if(res.ok){
      state.profile = res.data.user;
      if(state.clan){ const c = await api('GET','/api/clan'); if(c.ok) state.clan = c.data.clan; }
      showToast('Admin changes applied'); closeModal(); render();
    } else showToast(res.error);
  };
  const grantDevBtn = document.getElementById('grantDevBtn');
  if(grantDevBtn) grantDevBtn.onclick = async ()=>{
    const id = document.getElementById('grantDevId').value.trim();
    if(!id) return;
    const res = await api('POST','/api/admin/grant', { id });
    if(res.ok){ state.profile._devWhitelist = res.data.devWhitelist; showToast('Developer access granted to ID '+id); openModal('admin'); }
    else showToast(res.error);
  };
  document.querySelectorAll('[data-remove-dev]').forEach(el=>el.onclick=async ()=>{
    const res = await api('POST','/api/admin/revoke', { id: el.dataset.removeDev });
    if(res.ok){ state.profile._devWhitelist = res.data.devWhitelist; showToast('Access revoked'); openModal('admin'); }
    else showToast(res.error);
  });

  document.querySelectorAll('.crest-opt').forEach(btn=>btn.onclick=()=>{
    ui.selectedCrest = btn.dataset.crest;
    document.querySelectorAll('.crest-opt').forEach(b=>b.classList.remove('picked'));
    btn.classList.add('picked');
  });
  const confirmCreateClan = document.getElementById('confirmCreateClan');
  if(confirmCreateClan) confirmCreateClan.onclick = async ()=>{
    const name = document.getElementById('clanNameInput').value.trim();
    const res = await api('POST','/api/clan/create', { name, crest: ui.selectedCrest });
    if(res.ok){
      const c = await api('GET','/api/clan'); if(c.ok) state.clan = c.data.clan;
      showToast('🎉 Your first clan has been founded!'); closeModal(); render();
    } else showToast(res.error);
  };
  document.querySelectorAll('[data-join-clan]').forEach(el=>el.onclick=async ()=>{
    const res = await api('POST','/api/clan/join', { clanId: el.dataset.joinClan });
    if(res.ok){
      const c = await api('GET','/api/clan'); if(c.ok) state.clan = c.data.clan;
      showToast('Joined clan!'); closeModal(); render();
    } else showToast(res.error);
  });

  const confirmAddFriend = document.getElementById('confirmAddFriend');
  if(confirmAddFriend) confirmAddFriend.onclick = async ()=>{
    const q = document.getElementById('addFriendQuery').value.trim();
    if(!q){ showToast('Enter an ID or username'); return; }
    const res = await api('POST','/api/friends', { idOrUsername: q });
    if(res.ok){
      const f = await api('GET','/api/friends'); if(f.ok) state.friendsList = f.data.friends;
      showToast(`${res.data.friend.username} added to friends`); closeModal(); render();
    } else showToast(res.error);
  };

  const confirmCancelBtn = document.getElementById('confirmCancelBtn');
  if(confirmCancelBtn) confirmCancelBtn.onclick = closeModal;
  const confirmOkBtn = document.getElementById('confirmOkBtn');
  if(confirmOkBtn) confirmOkBtn.onclick = async ()=>{
    const p = modalPayload;
    if(!p){ closeModal(); return; }
    if(p.action==='leaveClan'){
      const res = await api('POST','/api/clan/leave', {});
      if(res.ok){ state.clan = null; showToast('Left the clan'); } else showToast(res.error);
    } else if(p.action==='removeFriend'){
      const res = await api('DELETE', `/api/friends/${p.payload}`);
      if(res.ok){ const f = await api('GET','/api/friends'); if(f.ok) state.friendsList = f.data.friends; }
      else showToast(res.error);
    }
    closeModal(); render();
  };

}

/* ============================================================
   INIT
============================================================ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
boot();
</script>
</body>
</html>
